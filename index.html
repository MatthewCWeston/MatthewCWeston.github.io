<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SPACEWAR // 1v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
</head>
<body data-state="loading">

<div class="app">
  <header class="app-header">
    <div class="title-block">
      <h1>SPACEWAR!</h1>
      <span class="subhead">ONNX // BROWSER</span>
    </div>

    <div class="control-bar">
      <div class="seg" id="modeSeg" role="tablist">
        <button type="button" class="seg-btn active" data-mode="cvc">Computer vs Computer</button>
        <button type="button" class="seg-btn" data-mode="hvc">Human vs Computer</button>
        <button type="button" class="seg-btn" data-mode="hotseat">Hotseat</button>
      </div>

      <div class="ctl-group">
        <label class="ctl-label" for="speedSlider">SPEED</label>
        <input type="range" id="speedSlider" min="1" max="5" step="1" value="5">
        <span class="readout" id="speedReadout">5</span>
      </div>

      <div class="ctl-group ctl-mini">
        <label class="ctl-label" for="fpsSlider">fps</label>
        <input type="range" id="fpsSlider" min="10" max="60" step="5" value="20">
        <span class="readout" id="fpsReadout">20</span>
      </div>
    </div>
  </header>

  <div class="stage-frame">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="hud-corner hud-corner-bl" id="hudP1"></div>
      <div class="hud-corner hud-corner-tr" id="hudP2"></div>

      <div class="overlay overlay-loading">
        <div class="big-msg" id="loadingMsg">LOADING MODEL...</div>
        <div class="sub-msg" id="loadingSub">model.fp16.onnx</div>
      </div>

      <div class="overlay overlay-paused">
        <div class="big-msg">PAUSED</div>
        <div class="sub-msg">press <kbd>P</kbd> to resume</div>
      </div>

      <div class="overlay overlay-status">
        <div class="big-msg" id="resultMsg">READY</div>
        <div class="sub-msg" id="resultSub"></div>
        <button id="startBtn" class="start-btn" disabled>[ START ]</button>
        <div class="key-hint hidden" id="keyHint"></div>
        <div class="shortcuts"><kbd>R</kbd> restart &nbsp;·&nbsp; <kbd>P</kbd> pause</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
